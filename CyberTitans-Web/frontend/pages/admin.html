<div id="page-admin" class="page pt-16">
  <main class="max-w-7xl mx-auto px-6 md:px-8 py-16">
    <div class="flex items-center justify-between mb-12">
      <div>
        <p class="font-mono text-[#D4AF37] text-xs uppercase tracking-widest mb-1">/ADMIN/CONTROL_CENTER</p>
        <h1 class="font-headline text-3xl font-bold">Member Management</h1>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="showPage('permissions')" class="px-4 py-2 border border-outline-variant/30 text-xs font-mono uppercase tracking-widest hover:bg-surface-bright transition-colors">Permissions Matrix</button>
        <button onclick="showToast('Export initiated')" class="px-4 py-2 bg-[#D4AF37] text-black text-xs font-bold uppercase tracking-widest hover:bg-[#e8c84a] transition-all">Export Data</button>
      </div>
    </div>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
      <div class="p-6 bg-surface-container-low border border-outline-variant/10"><p class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest mb-2">Total Members</p><p class="text-3xl font-headline font-bold">247</p></div>
      <div class="p-6 bg-surface-container-low border border-outline-variant/10"><p class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest mb-2">Active</p><p class="text-3xl font-headline font-bold text-primary">198</p></div>
      <div class="p-6 bg-surface-container-low border border-outline-variant/10"><p class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest mb-2">Pending</p><p class="text-3xl font-headline font-bold text-[#D4AF37]">23</p></div>
      <div class="p-6 bg-surface-container-low border border-outline-variant/10"><p class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest mb-2">Suspended</p><p class="text-3xl font-headline font-bold text-error">26</p></div>
    </div>

    <div class="bg-surface-container-low border border-outline-variant/10 overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/10">
        <div class="flex items-center gap-3">
          <span class="w-2 h-2 bg-primary animate-pulse rounded-full"></span>
          <h3 class="text-sm font-headline font-bold uppercase tracking-wider">Member Registry</h3>
        </div>
        <div class="relative">
          <input type="text" placeholder="Search members..." class="data-input w-48 text-xs pr-6"/>
          <span class="material-symbols-outlined absolute right-0 top-2.5 text-outline text-sm">search</span>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full perm-table">
          <thead>
            <tr class="border-b border-outline-variant/10">
              <th class="px-6 py-4 text-left text-[10px] font-mono text-on-surface-variant uppercase tracking-widest">Member</th>
              <th class="px-6 py-4 text-left text-[10px] font-mono text-on-surface-variant uppercase tracking-widest hidden md:table-cell">Role</th>
              <th class="px-6 py-4 text-left text-[10px] font-mono text-on-surface-variant uppercase tracking-widest hidden lg:table-cell">Joined</th>
              <th class="px-6 py-4 text-left text-[10px] font-mono text-on-surface-variant uppercase tracking-widest">Status</th>
              <th class="px-6 py-4 text-right text-[10px] font-mono text-on-surface-variant uppercase tracking-widest">Actions</th>
            </tr>
          </thead>
          <tbody id="admin-table"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
