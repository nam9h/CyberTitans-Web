<div id="page-my-profile" class="page pt-16">
  <div class="max-w-5xl mx-auto px-6 md:px-8 py-16">
    <div class="flex items-center justify-between mb-12">
      <div>
        <p class="font-mono text-primary text-xs uppercase tracking-widest mb-1">/MY_PROFILE</p>
        <h1 class="font-headline text-3xl font-bold">Account Settings</h1>
      </div>
      <button onclick="saveAccountProfile()" class="px-6 py-3 bg-primary text-[#0d6100] text-xs font-bold uppercase tracking-widest hover:brightness-110 transition-all neon-glow-primary">
        Save Changes
      </button>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
      <div class="lg:col-span-4 space-y-8">
        <div class="relative aspect-square bg-surface-container-highest overflow-hidden border border-outline-variant/30 group">
          <img id="profile-avatar" class="w-full h-full object-cover grayscale" src="https://ui-avatars.com/api/?background=222&color=fff&name=Operative" alt="Profile"/>
          <button onclick="showToast('Upload dialog would open')" class="absolute bottom-4 right-4 p-2 bg-surface-container-high border border-outline-variant/30 hover:bg-surface-bright transition-colors">
            <span class="material-symbols-outlined text-sm">photo_camera</span>
          </button>
        </div>
        <div class="bg-surface-container p-6 border-l-2 border-primary/40 space-y-4">
          <h4 class="text-[10px] font-mono text-primary uppercase tracking-[0.2em]">Clearance Status</h4>
          <div class="flex items-center gap-2"><span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span><span id="profile-role" class="font-mono text-sm text-primary">OPERATIVE</span></div>
          <div class="text-[10px] font-mono text-on-surface-variant">System active and encrypted</div>
        </div>
      </div>

      <div class="lg:col-span-8 space-y-10">
        <div>
          <h3 class="font-headline text-lg font-bold uppercase tracking-tight mb-6 flex items-center gap-4"><span class="w-2 h-2 bg-primary"></span>Identity Data</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div><label class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest block mb-2">Full Name</label><input type="text" id="input-name" class="data-input w-full bg-black border border-white/20 text-white font-mono p-2"/></div>
            <div><label class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest block mb-2">Username</label><input type="text" id="input-username" class="data-input w-full bg-black border border-white/20 text-white font-mono p-2" disabled placeholder="Can't be changed"/></div>
            <div><label class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest block mb-2">Email</label><input type="email" id="input-email" class="data-input w-full bg-black border border-white/20 text-white font-mono p-2"/></div>
            <div><label class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest block mb-2">Phone</label><input type="tel" id="input-phone" class="data-input w-full bg-black border border-white/20 text-white font-mono p-2"/></div>
          </div>
        </div>
        <div>
          <h3 class="font-headline text-lg font-bold uppercase tracking-tight mb-6 flex items-center gap-4"><span class="w-2 h-2 bg-tertiary"></span>Specialization</h3>
          <div>
            <label class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest block mb-2">Bio</label>
            <textarea id="input-bio" class="data-input w-full bg-black border border-white/20 text-white font-mono p-2 resize-none" rows="4"></textarea>
          </div>
          <div class="flex flex-wrap gap-2 mt-6">
            <span class="px-3 py-1 tag-primary text-[11px] font-mono bg-primary/20 text-primary border border-primary/30">SAD</span>
            <span class="px-3 py-1 tag-secondary text-[11px] font-mono bg-white/10 text-white border border-white/20">Web Dev</span>
            <button onclick="showToast('Tag editor coming soon')" class="px-3 py-1 bg-surface-container border border-outline-variant/30 text-[11px] font-mono hover:bg-surface-bright transition-colors">+ Add Tag</button>
          </div>
        </div>
        
        </div>
    </div>
  </div>
</div>
